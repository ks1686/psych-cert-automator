name: Build Psych Cert Gen

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
            artifact-name: macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            ext: dmg
            artifact-name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
            artifact-name: windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
            artifact-name: linux-x86_64

    name: Build (${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Runtimes ────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Version ─────────────────────────────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "
          import tomllib, sys
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          try:
              print(data['project']['version'])
          except KeyError:
              print('ERROR: [project] version not found in pyproject.toml', file=sys.stderr)
              sys.exit(1)
          ")
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Extracted version: ${VERSION}"

      # ── System dependencies ─────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      # ── Python deps + tests ─────────────────────────────────────
      - name: Install Python deps
        timeout-minutes: 5
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytest pytest-cov
          pip install -e .

      - name: Run pytest
        timeout-minutes: 5
        run: python -m pytest

      # ── Python sidecar ──────────────────────────────────────────
      - name: Build Python sidecar
        timeout-minutes: 10
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: python build/build.py

      # ── Frontend ────────────────────────────────────────────────
      - name: Install frontend deps
        timeout-minutes: 5
        run: bun install --frozen-lockfile

      - name: Build frontend
        timeout-minutes: 5
        run: bun run build

      # ── Tauri build ─────────────────────────────────────────────
      - name: Build Tauri
        timeout-minutes: 20
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build

      # ── Verify artifacts ────────────────────────────────────────
      - name: Verify artifact exists
        if: success()
        shell: bash
        run: |
          echo "::group::Checking for ${{ matrix.ext }} artifact"
          case "${{ matrix.target }}" in
            *apple*)
              ls -la src-tauri/target/release/bundle/dmg/*.dmg
              ;;
            *windows*)
              ls -la src-tauri/target/release/bundle/msi/*.msi
              ;;
            *linux*)
              ls -la src-tauri/target/release/bundle/appimage/*.AppImage
              ;;
          esac
          echo "::endgroup::"

      # ── Upload ──────────────────────────────────────────────────
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: psych-cert-gen-${{ steps.version.outputs.version }}-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── Release (tag pushes only) ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
